<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UK Sovereign Dashboards</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 2rem;
        line-height: 1.5;
        color: #1f2937;
        background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .hero {
        background: #0f172a;
        color: white;
        padding: 1.5rem;
        border-radius: 1rem;
        margin-bottom: 1rem;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
      }
      .card {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 0.75rem;
        padding: 1rem 1.25rem;
        box-shadow: 0 4px 10px rgba(15, 23, 42, 0.06);
      }
      .metric {
        font-size: 2rem;
        font-weight: bold;
        margin-top: 0.25rem;
      }
      .notes {
        margin-top: 1rem;
        padding-left: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="hero">
        <h1 id="title">UK Sovereign Dashboards</h1>
        <p id="subtitle">Loading your JSON data...</p>
      </div>

      <div id="status" class="card">Loading data...</div>
      <div id="metrics" class="grid"></div>
      <div id="notes" class="card"></div>
    </div>

    <script id="dashboard-data" type="application/json">
      {
        "title": "UK Sovereign Dashboards",
        "updated": "2026-06-29",
        "theme": "Sovereignty and resilience",
        "metrics": [
          { "name": "Energy security", "value": 78, "unit": "%" },
          { "name": "Food resilience", "value": 64, "unit": "%" },
          { "name": "Digital independence", "value": 81, "unit": "%" }
        ],
        "notes": [
          "This dashboard is now hosted on Vercel.",
          "Replace the sample data with your real JSON export when ready."
        ]
      }
    </script>

    <script>
      const candidates = [
        './whitehall_sandbox_strategic_data.json',
        './data.json',
        './public/whitehall_sandbox_strategic_data.json',
        './public/data.json'
      ];

      function renderDashboard(data, elements) {
        const { status, metrics, notes, title, subtitle } = elements;

        title.textContent = data.title || 'UK Sovereign Dashboards';
        subtitle.textContent = `${data.theme || 'Dashboard'} • Updated ${data.updated || 'n/a'}`;
        status.textContent = 'Dashboard ready';

        metrics.innerHTML = '';
        if (Array.isArray(data.metrics)) {
          data.metrics.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<strong>${item.name || 'Metric'}</strong><div class="metric">${item.value ?? '--'}${item.unit || ''}</div>`;
            metrics.appendChild(card);
          });
        }

        if (Array.isArray(data.notes) && data.notes.length) {
          notes.innerHTML = `<strong>Notes</strong><ul class="notes">${data.notes.map((note) => `<li>${note}</li>`).join('')}</ul>`;
        } else {
          notes.innerHTML = '<strong>No notes available.</strong>';
        }
      }

      async function loadData() {
        const status = document.getElementById('status');
        const metrics = document.getElementById('metrics');
        const notes = document.getElementById('notes');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');

        try {
          const inlineRaw = document.getElementById('dashboard-data').textContent;
          const inlineData = JSON.parse(inlineRaw);
          renderDashboard(inlineData, { status, metrics, notes, title, subtitle });
          return;
        } catch (error) {
          // Fall back to loading the JSON file if present.
        }

        for (const path of candidates) {
          try {
            const response = await fetch(path);
            if (!response.ok) continue;
            const data = await response.json();
            renderDashboard(data, { status, metrics, notes, title, subtitle });
            return;
          } catch (error) {
            // Try the next candidate.
          }
        }

        status.textContent = 'No JSON file was found yet.';
        metrics.innerHTML = '';
        notes.innerHTML = '<strong>Place your JSON file in the project root as whitehall_sandbox_strategic_data.json and refresh this page.</strong>';
      }

      loadData();
    </script>
  </body>
</html>
