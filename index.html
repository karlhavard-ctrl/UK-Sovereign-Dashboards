<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UK Sovereign Dashboards</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 2rem;
        line-height: 1.5;
        color: #1f2937;
        background: linear-gradient(135deg, #f8fafc, #e2e8f0);
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .hero {
        background: #0f172a;
        color: white;
        padding: 1.5rem;
        border-radius: 1rem;
        margin-bottom: 1rem;
      }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .controls {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
      }
      button {
        border: none;
        border-radius: 999px;
        padding: 0.6rem 1rem;
        background: #2563eb;
        color: white;
        cursor: pointer;
      }
      button.active {
        background: #1d4ed8;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
      }
      .card {
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 0.75rem;
        padding: 1rem 1.25rem;
        box-shadow: 0 4px 10px rgba(15, 23, 42, 0.06);
      }
      .metric {
        font-size: 2rem;
        font-weight: bold;
        margin-top: 0.25rem;
      }
      .notes {
        margin-top: 1rem;
        padding-left: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="hero">
        <div class="topbar">
          <div>
            <h1 id="title">UK Sovereign Dashboards</h1>
            <p id="subtitle">Loading your JSON data...</p>
          </div>
          <button id="refresh-btn">Reload data</button>
        </div>
      </div>

      <div class="controls">
        <button data-view="summary" class="active">Summary</button>
        <button data-view="metrics">Metrics</button>
        <button data-view="notes">Notes</button>
      </div>

      <div id="status" class="card">Loading data...</div>
      <div id="content"></div>
    </div>

    <script>
      const fallbackData = {
        title: 'UK Sovereign Dashboards',
        updated: '2026-06-29',
        theme: 'Sovereignty and resilience',
        metrics: [
          { name: 'Energy security', value: 78, unit: '%' },
          { name: 'Food resilience', value: 64, unit: '%' },
          { name: 'Digital independence', value: 81, unit: '%' }
        ],
        notes: [
          'This dashboard is now hosted on Vercel.',
          'Replace the sample data with your real JSON export when ready.'
        ]
      };

      const state = {
        data: fallbackData,
        view: 'summary'
      };

      function renderDashboard() {
        const content = document.getElementById('content');
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');
        const status = document.getElementById('status');
        const data = state.data || fallbackData;

        title.textContent = data.title || 'UK Sovereign Dashboards';
        subtitle.textContent = `${data.theme || 'Dashboard'} • Updated ${data.updated || 'n/a'}`;
        status.textContent = 'Dashboard ready';

        if (state.view === 'metrics') {
          content.innerHTML = `
            <div class="grid">
              ${Array.isArray(data.metrics) ? data.metrics.map((item) => `
                <div class="card">
                  <strong>${item.name || 'Metric'}</strong>
                  <div class="metric">${item.value ?? '--'}${item.unit || ''}</div>
                </div>
              `).join('') : '<div class="card">No metrics available.</div>'}
            </div>
          `;
          return;
        }

        if (state.view === 'notes') {
          content.innerHTML = `
            <div class="card">
              <strong>Notes</strong>
              <ul class="notes">
                ${Array.isArray(data.notes) ? data.notes.map((note) => `<li>${note}</li>`).join('') : '<li>No notes available.</li>'}
              </ul>
            </div>
          `;
          return;
        }

        content.innerHTML = `
          <div class="grid">
            <div class="card">
              <strong>Theme</strong>
              <div class="metric">${data.theme || 'Dashboard'}</div>
            </div>
            <div class="card">
              <strong>Updated</strong>
              <div class="metric">${data.updated || 'n/a'}</div>
            </div>
            <div class="card">
              <strong>Metrics</strong>
              <div class="metric">${Array.isArray(data.metrics) ? data.metrics.length : 0}</div>
            </div>
          </div>
        `;
      }

      async function loadData() {
        const status = document.getElementById('status');
        status.textContent = 'Loading data...';

        try {
          const response = await fetch('./whitehall_sandbox_strategic_data.json?' + Date.now());
          if (!response.ok) throw new Error('missing file');
          const data = await response.json();
          state.data = data;
          status.textContent = 'Loaded from whitehall_sandbox_strategic_data.json';
        } catch (error) {
          state.data = fallbackData;
          status.textContent = 'Loaded fallback sample data';
        }

        renderDashboard();
      }

      document.getElementById('refresh-btn').addEventListener('click', () => loadData());
      document.querySelectorAll('[data-view]').forEach((button) => {
        button.addEventListener('click', () => {
          document.querySelectorAll('[data-view]').forEach((item) => item.classList.remove('active'));
          button.classList.add('active');
          state.view = button.getAttribute('data-view');
          renderDashboard();
        });
      });

      loadData();
    </script>
  </body>
</html>
